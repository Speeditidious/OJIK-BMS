# Single source of truth: .env.prod at repo root.
# All services share this env_file. DATABASE_URL and REDIS_URL are
# constructed here so the internal hostnames (postgres, redis) are used
# without repeating credentials in .env.prod.

x-api-base: &api-base
  build:
    context: ./api
    target: production
  env_file: .env.prod
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    REDIS_URL: redis://redis:6379/0
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No external port — only accessible inside Docker network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # No external port — only accessible inside Docker network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    <<: *api-base
    ports:
      - "127.0.0.1:8000:8000"  # localhost only — nginx proxies externally
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery:
    <<: *api-base
    command: celery -A app.tasks worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery-beat:
    <<: *api-base
    command: celery -A app.tasks beat --loglevel=info
    depends_on:
      redis:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
