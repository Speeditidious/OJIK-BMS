user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;  # Hide nginx version

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name api.ojikbms.kr;
        return 301 https://$host$request_uri;
    }

    # HTTPS — API reverse proxy
    server {
        listen 443 ssl;
        http2 on;
        server_name api.ojikbms.kr;

        # Cloudflare Origin Certificate (place files here after generating)
        ssl_certificate     /etc/ssl/cloudflare/cert.pem;
        ssl_certificate_key /etc/ssl/cloudflare/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                                always;
        add_header X-Frame-Options           DENY                                   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

        # Allow only Cloudflare IPs on port 443 (optional hardening)
        # Uncomment after confirming Cloudflare proxies all traffic:
        # include /etc/nginx/cloudflare-ips.conf;
        # deny all;

        client_max_body_size 20M;

        # Re-resolve upstream DNS every 10s so nginx recovers automatically
        # when the api container restarts and gets a new IP.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8000;

        # Auth endpoints — stricter rate limit
        location ~ ^/auth/ {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass         $api_upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # All other API endpoints
        location / {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass         $api_upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
