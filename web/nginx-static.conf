server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /_next/static/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~ ^/dashboard/day/[^/]+/?$ {
        try_files /dashboard/day/__static__/index.html =404;
    }

    location ~ ^/issues/[^/]+/?$ {
        try_files /issues/__static__/index.html =404;
    }

    location ~ ^/songs/md5/[^/]+/?$ {
        try_files /songs/md5/__static__/index.html =404;
    }

    location ~ ^/songs/sha256/[^/]+/?$ {
        try_files /songs/sha256/__static__/index.html =404;
    }

    location ~ ^/u/[^/]+/?$ {
        try_files /u/__static__/index.html =404;
    }

    location ~ ^/users/[^/]+/dashboard/?$ {
        try_files /users/__static__/dashboard/index.html =404;
    }

    location ~ ^/users/[^/]+/?$ {
        try_files /users/__static__/index.html =404;
    }

    location / {
        try_files $uri $uri/ /404/index.html;
    }
}
