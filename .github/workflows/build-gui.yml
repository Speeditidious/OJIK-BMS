name: Build Tauri Client

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    outputs:
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client-tauri/package-lock.json

      - name: Install Rust toolchain
        working-directory: client-tauri
        run: |
          rustup show

      - name: Install dependencies
        working-directory: client-tauri
        run: |
          npm ci

      - name: Sync app version from tag
        id: version
        working-directory: client-tauri
        run: |
          node scripts/sync-version.mjs "${{ github.ref_name }}"

      - name: Build Tauri installer
        working-directory: client-tauri
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.display_version }}
        run: |
          npm run tauri -- build --bundles nsis

      - name: Prepare release asset
        working-directory: client-tauri
        run: |
          $tagName = "${{ github.ref_name }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $installer = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Tauri NSIS installer was produced in $bundleDir"
          }

          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          $assetBase = "ojikbms-client-$tagName-windows-x64-setup"
          Copy-Item $installer.FullName "release/$assetBase.exe"

          $signature = Get-Item "$($installer.FullName).sig" -ErrorAction SilentlyContinue
          if ($signature) {
            Copy-Item $signature.FullName "release/$assetBase.exe.sig"
          }

          Get-ChildItem "release"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ojikbms-tauri-windows
          path: client-tauri/release/*

  create-release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: ojikbms-tauri-windows
          path: release-assets

      - name: Create release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ needs.build-windows.outputs.is_prerelease }}
