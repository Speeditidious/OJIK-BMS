name: Build Tauri Client

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    outputs:
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client-tauri/package-lock.json

      - name: Install Rust toolchain
        working-directory: client-tauri
        run: |
          rustup show

      - name: Install dependencies
        working-directory: client-tauri
        run: |
          npm ci

      - name: Sync app version from tag
        id: version
        working-directory: client-tauri
        run: |
          node scripts/sync-version.mjs "${{ github.ref_name }}"

      - name: Prepare Tauri signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_CONTENT: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_CONTENT)) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is empty. Add the private key generated by npm run tauri signer generate -- -w <path>."
          }

          $keyContent = $env:TAURI_SIGNING_PRIVATE_KEY_CONTENT.Trim() -replace '\\n', "`n"
          if ($keyContent.StartsWith("untrusted comment:")) {
            # Tauri natively supports raw minisign key content; pass it directly via multiline env var
            $delim = "TAURI_SIGNING_KEY_EOF"
            Add-Content -Path $env:GITHUB_ENV -Value "TAURI_SIGNING_PRIVATE_KEY<<$delim"
            Add-Content -Path $env:GITHUB_ENV -Value $keyContent
            Add-Content -Path $env:GITHUB_ENV -Value $delim
          } else {
            # Already base64-encoded; strip padding characters that Tauri rejects
            $keyContent = ($keyContent -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ } | Select-Object -First 1).TrimEnd('=')
            Add-Content -Path $env:GITHUB_ENV -Value "TAURI_SIGNING_PRIVATE_KEY=$keyContent"
          }

      - name: Validate Tauri signing key
        working-directory: client-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm run tauri -- signer sign package.json
          Remove-Item package.json.sig -ErrorAction SilentlyContinue

      - name: Build Tauri installer
        working-directory: client-tauri
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.display_version }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm run tauri -- build --bundles nsis

      - name: Prepare release asset
        working-directory: client-tauri
        run: |
          $tagName = "${{ github.ref_name }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $installer = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Tauri NSIS installer was produced in $bundleDir"
          }

          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          $assetBase = "ojikbms-client-$tagName-windows-x64-setup"
          Copy-Item $installer.FullName "release/$assetBase.exe"

          $signature = Get-Item "$($installer.FullName).sig" -ErrorAction SilentlyContinue
          if (-not $signature) {
            throw "No updater signature was produced for $($installer.FullName). Ensure TAURI_SIGNING_PRIVATE_KEY is set."
          }
          Copy-Item $signature.FullName "release/$assetBase.exe.sig"

          $assetPath = "release/$assetBase.exe"
          $size = (Get-Item $assetPath).Length
          $sha256 = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLower()
          $sig = Get-Content "release/$assetBase.exe.sig" -Raw

          @{
            version         = "${{ steps.version.outputs.display_version }}"
            target_os       = "windows"
            arch            = "x86_64"
            installer_kind  = "nsis"
            asset_name      = "$assetBase.exe"
            asset_size_bytes = $size
            asset_sha256    = $sha256
            tauri_signature = $sig.Trim()
          } | ConvertTo-Json | Out-File "release/$assetBase.metadata.json" -Encoding utf8

          Get-ChildItem "release"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ojikbms-tauri-windows
          path: client-tauri/release/*

  create-release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: ojikbms-tauri-windows
          path: release-assets

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ needs.build-windows.outputs.is_prerelease }}

      - name: Register client update draft
        env:
          API_URL: ${{ secrets.OJIK_API_URL }}
          CLIENT_UPDATE_INGEST_TOKEN: ${{ secrets.CLIENT_UPDATE_INGEST_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: python client-tauri/scripts/register-client-update.py
