name: Build Tauri Client

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    outputs:
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Rust toolchain
        working-directory: client
        run: |
          rustup show

      - name: Install dependencies
        working-directory: client
        run: |
          npm ci

      - name: Sync app version from tag
        id: version
        working-directory: client
        run: |
          node scripts/sync-version.mjs "${{ github.ref_name }}"

      - name: Build Tauri installer
        working-directory: client
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.display_version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm run tauri -- build --bundles nsis

      - name: Prepare release asset
        working-directory: client
        run: |
          $tagName = "${{ github.ref_name }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $installer = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Tauri NSIS installer was produced in $bundleDir"
          }

          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          $assetBase = "ojikbms-client-$tagName-windows-x64-setup"
          Copy-Item $installer.FullName "release/$assetBase.exe"

          $signature = Get-Item "$($installer.FullName).sig" -ErrorAction SilentlyContinue
          if (-not $signature) {
            throw "No updater signature was produced for $($installer.FullName). Ensure TAURI_SIGNING_PRIVATE_KEY is set."
          }
          Copy-Item $signature.FullName "release/$assetBase.exe.sig"

          $assetPath = "release/$assetBase.exe"
          $appExe = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $appExe) {
            throw "No release executable was produced in src-tauri/target/release"
          }
          $size = (Get-Item $assetPath).Length
          $appSize = $appExe.Length
          $sha256 = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLower()
          $sig = Get-Content "release/$assetBase.exe.sig" -Raw

          @{
            version         = "${{ steps.version.outputs.display_version }}"
            target_os       = "windows"
            arch            = "x86_64"
            installer_kind  = "nsis"
            asset_name      = "$assetBase.exe"
            asset_size_bytes = $size
            app_size_bytes   = $appSize
            asset_sha256    = $sha256
            tauri_signature = $sig.Trim()
          } | ConvertTo-Json | Out-File "release/$assetBase.metadata.json" -Encoding utf8

          Get-ChildItem "release"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ojikbms-tauri-windows
          path: client/release/
          if-no-files-found: error

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Rust toolchain
        working-directory: client
        run: |
          rustup show

      - name: Install dependencies
        working-directory: client
        run: |
          npm ci

      - name: Sync app version from tag
        id: version
        working-directory: client
        run: |
          node scripts/sync-version.mjs "${{ github.ref_name }}"

      - name: Build Tauri AppImage
        working-directory: client
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.display_version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm run tauri -- build --bundles appimage

      - name: Prepare release asset
        working-directory: client
        run: |
          set -euo pipefail
          tag_name="${{ github.ref_name }}"
          bundle_dir="src-tauri/target/release/bundle/appimage"
          installer="$(find "$bundle_dir" -maxdepth 1 -name '*.AppImage' -type f | sort | tail -n 1)"
          if [ -z "$installer" ]; then
            echo "No Tauri AppImage was produced in $bundle_dir" >&2
            exit 1
          fi

          mkdir -p release
          asset_base="ojikbms-client-${tag_name}-linux-x64-appimage"
          cp "$installer" "release/${asset_base}.AppImage"

          if [ ! -f "${installer}.sig" ]; then
            echo "No updater signature was produced for $installer. Ensure TAURI_SIGNING_PRIVATE_KEY is set." >&2
            exit 1
          fi
          cp "${installer}.sig" "release/${asset_base}.AppImage.sig"

          asset_path="release/${asset_base}.AppImage"
          size="$(stat -c%s "$asset_path")"
          sha256="$(sha256sum "$asset_path" | awk '{print $1}')"
          sig="$(cat "release/${asset_base}.AppImage.sig")"

          jq -n \
            --arg version "${{ steps.version.outputs.display_version }}" \
            --arg asset_name "${asset_base}.AppImage" \
            --arg sha256 "$sha256" \
            --arg sig "$sig" \
            --argjson size "$size" \
            '{
              version: $version,
              target_os: "linux",
              arch: "x86_64",
              installer_kind: "appimage",
              asset_name: $asset_name,
              asset_size_bytes: $size,
              app_size_bytes: $size,
              asset_sha256: $sha256,
              tauri_signature: $sig
            }' > "release/${asset_base}.metadata.json"

          ls -la release

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ojikbms-tauri-linux
          path: client/release/
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: ojikbms-tauri-windows
          path: release-assets-raw/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: ojikbms-tauri-linux
          path: release-assets-raw/linux

      - name: Flatten release assets
        run: |
          set -e
          mkdir -p release-assets
          find release-assets-raw -type f -exec mv -t release-assets {} +
          echo "--- release-assets contents ---"
          ls -la release-assets

      - name: Create release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ needs.build-windows.outputs.is_prerelease }}

      - name: Prepare register payloads
        id: payloads
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          PAYLOADS=$(python3 - <<'PY'
          import importlib.util
          import json
          import os
          from pathlib import Path

          script = Path("client/scripts/register-client-update.py")
          spec = importlib.util.spec_from_file_location("register_client_update", script)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          payloads = module.build_payloads(
              Path("release-assets"),
              os.environ["TAG"],
              os.environ["REPO"],
          )
          print(json.dumps(payloads, separators=(",", ":")))
          PY
          )
          echo "payloads<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PAYLOADS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Register client update draft via VPS SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PAYLOADS,INGEST_TOKEN
          script: |
            set -e
            echo "$PAYLOADS" | jq -c '.[]' | while read -r payload; do
              echo "$payload" | curl -sf \
                -X POST http://localhost:8000/internal/client-updates/from-release \
                -H "Content-Type: application/json" \
                -H "X-OJIK-Internal-Token: $INGEST_TOKEN" \
                -d @- \
                | python3 -c "import sys,json; d=json.load(sys.stdin); action='created' if d.get('created') else 'updated'; print(f'OK: draft row {action} (id={d[\"id\"]}, published={d[\"is_published\"]})')"
            done
        env:
          PAYLOADS: ${{ steps.payloads.outputs.payloads }}
          INGEST_TOKEN: ${{ secrets.CLIENT_UPDATE_INGEST_TOKEN }}
