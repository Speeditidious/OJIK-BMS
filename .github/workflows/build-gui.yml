name: Build Tauri Client

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    outputs:
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client-tauri/package-lock.json

      - name: Install Rust toolchain
        working-directory: client-tauri
        run: |
          rustup show

      - name: Install dependencies
        working-directory: client-tauri
        run: |
          npm ci

      - name: Sync app version from tag
        id: version
        working-directory: client-tauri
        run: |
          node scripts/sync-version.mjs "${{ github.ref_name }}"

      - name: Build Tauri installer
        working-directory: client-tauri
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.display_version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm run tauri -- build --bundles nsis

      - name: Prepare release asset
        working-directory: client-tauri
        run: |
          $tagName = "${{ github.ref_name }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $installer = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Tauri NSIS installer was produced in $bundleDir"
          }

          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          $assetBase = "ojikbms-client-$tagName-windows-x64-setup"
          Copy-Item $installer.FullName "release/$assetBase.exe"

          $signature = Get-Item "$($installer.FullName).sig" -ErrorAction SilentlyContinue
          if (-not $signature) {
            throw "No updater signature was produced for $($installer.FullName). Ensure TAURI_SIGNING_PRIVATE_KEY is set."
          }
          Copy-Item $signature.FullName "release/$assetBase.exe.sig"

          $assetPath = "release/$assetBase.exe"
          $size = (Get-Item $assetPath).Length
          $sha256 = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLower()
          $sig = Get-Content "release/$assetBase.exe.sig" -Raw

          @{
            version         = "${{ steps.version.outputs.display_version }}"
            target_os       = "windows"
            arch            = "x86_64"
            installer_kind  = "nsis"
            asset_name      = "$assetBase.exe"
            asset_size_bytes = $size
            asset_sha256    = $sha256
            tauri_signature = $sig.Trim()
          } | ConvertTo-Json | Out-File "release/$assetBase.metadata.json" -Encoding utf8

          Get-ChildItem "release"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ojikbms-tauri-windows
          path: client-tauri/release/
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: ojikbms-tauri-windows
          path: release-assets-raw

      - name: Flatten release assets
        run: |
          set -e
          mkdir -p release-assets
          find release-assets-raw -type f -exec mv -t release-assets {} +
          echo "--- release-assets contents ---"
          ls -la release-assets

      - name: Create release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ needs.build-windows.outputs.is_prerelease }}

      - name: Prepare register payload
        id: payload
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          ASSET_BASE="ojikbms-client-${TAG}-windows-x64-setup"
          META="release-assets/${ASSET_BASE}.metadata.json"
          SIG=$(cat "release-assets/${ASSET_BASE}.exe.sig")
          VERSION="${TAG#v}"
          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg repo "$REPO" \
            --arg sig "$SIG" \
            --argjson size "$(jq '.asset_size_bytes' "$META")" \
            --arg sha256 "$(jq -r '.asset_sha256' "$META")" \
            '{
              version: $version, channel: "stable",
              target_os: "windows", arch: "x86_64", installer_kind: "nsis",
              title: ("OJIK BMS Client v" + $version),
              body_markdown: ("GitHub Release에서 생성된 클라이언트 업데이트 초안입니다.\n공개 전에 릴리즈 노트를 확인하고 타이틀/내용을 수정하세요.\n\n릴리즈 페이지: https://github.com/" + $repo + "/releases/tag/" + $tag),
              release_page_url: ("https://github.com/" + $repo + "/releases/tag/" + $tag),
              update_url: ("https://github.com/" + $repo + "/releases/download/" + $tag + "/ojikbms-client-" + $tag + "-windows-x64-setup.exe"),
              tauri_signature: $sig,
              asset_size_bytes: $size,
              asset_sha256: $sha256,
              mandatory: false,
              min_supported_version: null
            }')
          echo "payload<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Register client update draft via VPS SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PAYLOAD,INGEST_TOKEN
          script: |
            set -e
            echo "$PAYLOAD" | curl -sf \
              -X POST http://localhost:8000/internal/client-updates/from-release \
              -H "Content-Type: application/json" \
              -H "X-OJIK-Internal-Token: $INGEST_TOKEN" \
              -d @- \
              | python3 -c "import sys,json; d=json.load(sys.stdin); action='created' if d.get('created') else 'updated'; print(f'OK: draft row {action} (id={d[\"id\"]}, published={d[\"is_published\"]})')"
        env:
          PAYLOAD: ${{ steps.payload.outputs.payload }}
          INGEST_TOKEN: ${{ secrets.CLIENT_UPDATE_INGEST_TOKEN }}
