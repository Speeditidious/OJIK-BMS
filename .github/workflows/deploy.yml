name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy to Vultr VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /opt/ojik-bms

            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            touch ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
            ssh-keygen -F github.com >/dev/null || ssh-keyscan -H github.com >> ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts

            git pull origin main

            docker compose -f docker-compose.prod.yml --env-file .env.prod build
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d postgres redis

            # Run DB migrations before starting API/Celery services
            docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm migrate

            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps api celery celery-beat nginx

            # Clean up unused images/containers
            docker system prune -f
