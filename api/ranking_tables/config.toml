# ============================================================
# 랭킹 시스템 설정
# ============================================================
# 이 파일을 수정한 뒤 서버를 재시작하면 반영됩니다.
# docker compose restart api celery celery-beat
#
# ── 이 파일의 역할 ──
# 각 난이도표의 파라미터(상수)만 관리합니다.
# 실제 계산 공식은 api/app/services/ranking_calculator.py 에 구현되어 있습니다.
#
# ── 난이도표 추가 ──
# [[tables]] 블록을 추가하고 서버를 재시작하면
# 랭킹 페이지에 자동으로 탭이 추가됩니다.
# slug 는 difficulty_tables 테이블의 slug 컬럼과 일치해야 합니다.
#
# ── 단위인정 연동 ──
# course_name 은 DB 의 Course.name 과 정확히 일치해야 합니다.
# source_table 은 해당 코스가 import 된 난이도표의 slug 입니다.
# source_table 생략 시 자기 테이블의 코스를 검색합니다.
#
# ── 공식 개요 ──
# song_rating = C_table × (Base + Bonus)
# Base = base_lamp_mult[lamp] × rank_mult[rank] × (L(level) + upper_lamp_bonus[lamp])
# Bonus = bp_weight × f_bp(bp) + rate_weight × f_rate(rate)
# C_table = high_tier_rating_anchor / (Base_ref + Bonus_ref)  ← reference_20
# player_level = min(level_from_exp(total_exp, exp_level_step), max_level)
# ============================================================

# ── Global 기본값 ──────────────────────────────────────────
[global]
top_n     = 100                   # 최종 레이팅 합산에 들어가는 top-n개
high_tier_rating_anchor = 1000    # top-n개 전부 이 수치면 최종 BMSFORCE=20.000
exp_level_step          = 100     # EXP 레벨 역치 K: threshold(n) = 100 × n × (n+1)
max_level               = 200     # EXP 레벨 상한. 도달 후 경험치를 더 얻어도 레벨은 max_level 유지.
                                  # per-table override 가능 (난이도표별 [[tables]] 블록에서 max_level = N 설정)

[global.rank_mult]
F   = 0.00
E   = 0.10
D   = 0.30
C   = 0.50
B   = 0.80
A   = 1.00
AA  = 1.04
AAA = 1.08

[global.bonus]
bp_weight   = 0.15
rate_weight = 0.40
bp_floor    = 150
bp_slope    = 1.0
rate_floor  = 0.70
rate_slope  = 1.0

# BMSFORCE 엠블렘 (임시로 텍스트 색깔만 꾸밈).
# min_value <= rating_norm < max_value, 마지막 구간은 max_value 키를 생략해 open-ended 처리.
[[global.bmsforce_emblems]]
tier           = "rookie"
min_value      = 0.000
max_value      = 2.000
color          = "#9E9E9E"
glow_intensity = "none"
label          = "Rookie"

