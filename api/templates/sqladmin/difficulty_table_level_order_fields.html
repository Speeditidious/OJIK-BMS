<style>
  .level-order-help {
    display: block;
    margin-top: 0.35rem;
  }

  .select2-selection__choice[draggable="true"] {
    cursor: grab;
  }

  .select2-selection__choice.level-order-drag-over {
    outline: 2px solid var(--tblr-primary);
    outline-offset: 2px;
  }
</style>

<script>
(function () {
  const ENHANCED_FIELDS = ["display_level_order", "non_regular_level_order"];

  function parseLevelOrder() {
    const field = document.querySelector('[name="level_order"]');
    if (!field) return [];
    try {
      const parsed = JSON.parse(field.value || "[]");
      if (!Array.isArray(parsed)) return [];
      return parsed.map((v) => String(v).trim()).filter(Boolean);
    } catch (_e) {
      return [];
    }
  }

  // Read the visual chip order directly from Select2's rendered DOM.
  // Each chip has a title attribute equal to the option value.
  function getChipValues(select) {
    const container = window.jQuery(select).next(".select2-container")[0];
    if (!container) return [];
    return Array.from(container.querySelectorAll(".select2-selection__choice"))
      .map((c) => c.getAttribute("title"))
      .filter(Boolean);
  }

  // Rebuild <option> elements with selected options first (in desired order),
  // followed by unselected options in levelOrder. Used only during init.
  function buildOptions(select, levelOrder, selectedOrdered) {
    const selectedSet = new Set(selectedOrdered);
    select.innerHTML = "";
    for (const value of selectedOrdered) {
      select.append(new Option(value, value, true, true));
    }
    for (const level of levelOrder) {
      if (!selectedSet.has(level)) {
        select.append(new Option(level, level, false, false));
      }
    }
  }

  // Update <option> selected state and DOM order to match orderedValues,
  // WITHOUT firing a change event (so Select2 does not re-render and reset chip positions).
  function syncOptions(select, orderedValues) {
    const selectedSet = new Set(orderedValues);
    for (const value of orderedValues) {
      const opt = Array.from(select.options).find((o) => o.value === value);
      if (opt) {
        opt.selected = true;
        select.append(opt); // moves to end, building up the desired order
      }
    }
    for (const opt of Array.from(select.options)) {
      if (!selectedSet.has(opt.value)) opt.selected = false;
    }
  }

  // Physically reorder chip <li> elements inside Select2's rendered container,
  // then sync the underlying <option> order for correct form submission.
  function refreshChipOrder(select, newOrder) {
    const container = window.jQuery(select).next(".select2-container")[0];
    if (!container) return;
    const rendered = container.querySelector(".select2-selection__rendered");
    if (!rendered) return;
    const searchLi = rendered.querySelector(".select2-search");

    for (const value of newOrder) {
      const chip = Array.from(rendered.querySelectorAll(".select2-selection__choice")).find(
        (c) => c.getAttribute("title") === value,
      );
      if (chip) {
        if (searchLi) {
          rendered.insertBefore(chip, searchLi);
        } else {
          rendered.appendChild(chip);
        }
      }
    }

    syncOptions(select, newOrder);
  }

  function enhanceField(fieldName, levelOrder) {
    const select = document.querySelector(`select[name="${fieldName}"]`);
    if (!select || !window.jQuery || !window.jQuery.fn.select2) return;

    const allowed = new Set(levelOrder);

    // Parse the pre-existing value from data-json (set by Select2TagsWidget).
    let jsonData = [];
    try {
      jsonData = JSON.parse(window.jQuery(select).data("json") || "[]");
    } catch (_e) {}
    const seen = new Set();
    const initialValues = [];
    for (const raw of jsonData) {
      const v = String(raw).trim();
      if (v && allowed.has(v) && !seen.has(v)) {
        seen.add(v);
        initialValues.push(v);
      }
    }

    if (window.jQuery(select).data("select2")) {
      window.jQuery(select).select2("destroy");
    }

    // Put selected options first in desired order so Select2 renders chips correctly on init.
    buildOptions(select, levelOrder, initialValues);

    window.jQuery(select).select2({
      tags: false,
      multiple: true,
      width: "100%",
      closeOnSelect: false,
      placeholder: "Select levels from level_order",
    });

    const helper = document.createElement("small");
    helper.className = "text-muted level-order-help";
    helper.textContent = "Select levels from level_order. Drag selected chips to change order.";
    window.jQuery(select).next(".select2-container").after(helper);

    function attachDragHandlers() {
      const container = window.jQuery(select).next(".select2-container")[0];
      if (!container) return;
      const choices = Array.from(container.querySelectorAll(".select2-selection__choice"));
      choices.forEach((choice, index) => {
        choice.setAttribute("draggable", "true");
        choice.dataset.levelOrderIndex = String(index);

        choice.addEventListener("dragstart", (event) => {
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", String(index));
        });

        choice.addEventListener("dragover", (event) => {
          event.preventDefault();
          choice.classList.add("level-order-drag-over");
        });

        choice.addEventListener("dragleave", () => {
          choice.classList.remove("level-order-drag-over");
        });

        choice.addEventListener("drop", (event) => {
          event.preventDefault();
          choice.classList.remove("level-order-drag-over");

          const from = Number(event.dataTransfer.getData("text/plain"));
          const to = Number(choice.dataset.levelOrderIndex);
          if (!Number.isInteger(from) || !Number.isInteger(to) || from === to) return;

          // Directly move the chip DOM element to the new position.
          const container2 = window.jQuery(select).next(".select2-container")[0];
          if (!container2) return;
          const currentChips = Array.from(
            container2.querySelectorAll(".select2-selection__choice"),
          );
          const fromChip = currentChips[from];
          const toChip = currentChips[to];
          if (!fromChip || !toChip) return;

          if (from < to) {
            toChip.after(fromChip);
          } else {
            toChip.before(fromChip);
          }

          // Sync underlying <option> order without triggering Select2 re-render.
          syncOptions(select, getChipValues(select));

          window.setTimeout(attachDragHandlers, 0);
        });
      });
    }

    // When a new item is selected, Select2 places its chip at the levelOrder DOM position.
    // We immediately move it to the end so the chip appears in selection order.
    window.jQuery(select).on("select2:select", (event) => {
      const value = String(event.params.data.id);
      // Build new order: existing chips (excluding the just-added one) + new value at end.
      const existing = getChipValues(select).filter((v) => v !== value);
      refreshChipOrder(select, [...existing, value]);
      window.setTimeout(attachDragHandlers, 0);
    });

    window.jQuery(select).on("select2:unselect", () => {
      // After Select2 removes the chip, sync DOM option order to match remaining chips.
      window.setTimeout(() => {
        syncOptions(select, getChipValues(select));
        attachDragHandlers();
      }, 0);
    });

    attachDragHandlers();
  }

  function enhanceAll() {
    const levelOrder = parseLevelOrder();
    for (const fieldName of ENHANCED_FIELDS) {
      enhanceField(fieldName, levelOrder);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", enhanceAll);
  } else {
    enhanceAll();
  }
})();
</script>
