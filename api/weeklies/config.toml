[settings]
timezone = "Asia/Seoul"
rollover = { day_of_week = "mon", hour = 4, minute = 0 }
default_pick_count = 7

# ─────────────────────────── 5KEYS AERY ───────────────────────────
[[categories]]
key = "5aery"
name = "5KEYS AERY"
order = 0

  [[categories.brackets]]
  key = "starter"
  order = 0
  color = "#7FB069"
  selectors = [ { table = "5aery", level_range = ["LEVEL 1", "LEVEL 11"] } ]

  [[categories.brackets]]
  key = "novice"
  order = 1
  color = "#A7C957"
  selectors = [ { table = "5aery", level_range = ["LEVEL 12", "LEVEL 15"] } ]

  [[categories.brackets]]
