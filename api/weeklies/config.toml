  order = 2
  color = "#E9C46A"
  selectors = [ { table = "5aery", level_range = ["LEVEL 15+", "LEVEL 17"] } ]

  [[categories.brackets]]
  key = "advanced"
  order = 3
  color = "#F4A261"
  selectors = [ { table = "5aery", level_range = ["LEVEL 17+", "LEVEL 18"] } ]

  [[categories.brackets]]
  key = "expert"
  order = 4
  color = "#E76F51"
  selectors = [ { table = "5aery", level_range = ["LEVEL 18+", "LEVEL 19"] } ]

  [[categories.brackets]]
  key = "master"
  order = 5
  color = "#9B2226"
  selectors = [ { table = "5aery", level_range = ["LEVEL 19+", "LEVEL 20+"] } ]

